<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Layout</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <div class="logo">로고</div>

        <div class="header-right">
            <ul class="utility-menu">
                <li><a href="#">고객센터</a></li>
                <li><a href="#">마이페이지</a></li>
                <li><a href="#">로그아웃</a></li>
            </ul>

            <div class="icon-group">
                <button type="button" aria-label="검색"><i class="fa-solid fa-magnifying-glass"></i></button>
                <button type="button" aria-label="알림"><i class="fa-regular fa-bell"></i></button>
                <button type="button" aria-label="메뉴"><i class="fa-solid fa-bars"></i></button>
            </div>
        </div>
    </div>
</header>

</body>
</html>
