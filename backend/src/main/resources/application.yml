server:
  port: ${PORT:5000}

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE:solefn}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:solefn_user}
    password: ${MYSQL_PASSWORD:solefn_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:solefn-secret-key-change-in-production-must-be-long}
  expiration: 86400000

naver:
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}
