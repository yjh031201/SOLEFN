server:
  port: ${PORT:5000}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${MYSQL_DATABASE:solefn_db}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${MYSQL_USER:solefn_user}
    password: ${MYSQL_PASSWORD:solefn_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

naver:
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}

jwt:
  secret: ${JWT_SECRET:solefn-super-secret-key-please-change-in-production-min-32-chars}
  expiration-ms: 86400000  # 24시간 (밀리초)