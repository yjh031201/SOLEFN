version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: solefn-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: solefn_db
      MYSQL_USER: solefn_user
      MYSQL_PASSWORD: "solefn_pass"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: solefn-backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      MYSQL_DATABASE: solefn_db
      MYSQL_USER: solefn_user
      MYSQL_PASSWORD: "solefn_pass"
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
